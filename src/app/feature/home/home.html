<div class="container bg-app-bg relative flex flex-col gap-[150px] pb-[150px] overflow-x-hidden max-md:gap-[80px] max-md:pb-[80px]">

  <section class="pt-[80px] mb-[450px] flex flex-col gap-10 relative z-[2] max-md:pt-[120px] max-md:gap-5 max-md:mb-[-45px]">
    <h1 class="max-w-[1000px] text-[96px] leading-[121px] text-primary uppercase font-extrabold bg-transparent max-md:text-[48px] max-md:leading-[1.1]">
      Willkommen bei <br> Pfadi St. Justus <br> in Flums
    </h1>
    <a routerLink="/join"
       class="w-[376px] h-[72px] border-[5px] border-black rounded-[81px] flex items-center justify-center font-bold text-[24px] text-black transition-all duration-300 hover:bg-black hover:text-app-bg hover:-translate-y-1 hover:shadow-[0_8px_16px_rgba(0,0,0,0.15)] active:-translate-y-0.5 max-md:w-full max-md:h-[60px] max-md:text-[20px] max-md:border-[3px]">
      Mitglied werden
    </a>
  </section>

  <div class="absolute top-[60px] right-0 w-full max-w-[1200px] z-[1] pointer-events-none max-md:top-[100px] max-md:opacity-70">
    <div class="w-full flex justify-end relative z-[2] right-[100px]">
      <img src="/assets/images/group.png" class="w-[60%] h-auto object-contain max-md:hidden" alt="Pfadi Gruppe">
    </div>
    <div class="absolute bottom-[-350px] right-[-180px] z-[1] w-[70%]">
      <img src="/assets/elements/blob.svg" alt="blob" class="w-full h-auto max-md:hidden">
    </div>
  </div>

  <section class="grid grid-cols-[repeat(auto-fit,minmax(300px,1fr))] gap-[23px] relative z-[3] max-md:grid-cols-2 max-md:gap-[15px]">
    @for (group of stufen; track group.slug) {
      <div class="aspect-square flex items-center justify-center cursor-pointer transition-all duration-300 hover:-translate-y-2 hover:scale-[1.03] hover:shadow-[0_12px_24px_rgba(0,0,0,0.15)] active:-translate-y-1 active:scale-[1.01]"
           [routerLink]="['/stufe', group.slug]"
           [style.background-color]="group.color">
        <span class="font-bold text-[20px] uppercase pointer-events-none max-md:text-[16px]">{{ group.name }}</span>
      </div>
    }
  </section>

  <section class="flex flex-col gap-10 max-md:gap-5">
    <h2 class="text-[48px] max-md:text-[28px]">Das läuft bei uns gerade</h2>
    <div class="grid grid-cols-3 gap-[30px] max-md:grid-cols-1 max-md:gap-5 md:max-lg:grid-cols-2">
      @for (i of [1,2,3,4,5,6,7,8,9]; track i) {
        <div class="w-full h-[538px] bg-muted border-[5px] border-white box-border max-md:h-[300px]"></div>
      }
    </div>
  </section>

</div>

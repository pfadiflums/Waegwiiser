<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/images/logo.svg" alt="Logo" class="logo">
      <h1>Willkommen zurück</h1>
      <p>Bitte logge dich in dein Konto ein</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      @if (error()) {
        <div class="error-message">
          {{ error() }}
        </div>
      }

      <div class="form-group">
        <label for="email">E-Mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="name@beispiel.ch"
          [class.invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        >
      </div>

      <div class="form-group">
        <label for="password">Passwort</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
        >
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading() || loginForm.invalid">
        {{ isLoading() ? 'Lädt...' : 'Einloggen' }}
      </button>

      <div class="divider">
        <span>oder</span>
      </div>

      <button type="button" (click)="loginWithMidata()" class="midata-btn">
        <img src="assets/images/midata-logo.png" alt="" class="btn-icon">
        Mit MiData einloggen
      </button>
    </form>
  </div>
</div>

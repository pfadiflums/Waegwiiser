<div class="bg-background flex min-h-screen items-center justify-center p-5">

  <section hlmCard class="w-full max-w-sm">

    <div hlmCardHeader class="items-center text-center">
      <img
        ngSrc="assets/images/logo.svg"
        alt="Logo"
        width="120"
        height="40"
        class="mx-auto mb-2 opacity-70"
        priority
      />
      <h1 hlmCardTitle class="text-xl">Willkommen zurück</h1>
      <p hlmCardDescription>Logge dich mit deinem MiData-Konto ein</p>
    </div>

    <div hlmCardContent>
      <button
        hlmBtn
        variant="outline"
        type="button"
        class="w-full"
        (click)="loginWithMidata()"
      >
        <img
          ngSrc="assets/images/midata-logo.png"
          alt=""
          width="18"
          height="18"
          aria-hidden="true"
        />
        Mit MiData einloggen
      </button>
    </div>

  </section>

</div>
